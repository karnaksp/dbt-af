version: 2

models:
  - name: svc_investment_signals.mart_signal_effectiveness
    description: Оценка движения цены после каждого сигнала.
    config:
      schedule: "@hourly"
    columns:
      - name: signal_id
        tests:
          - unique
          - not_null
      - name: signal_quality_bucket
        tests:
          - accepted_values:
              arguments:
                values: ['useful', 'weak_positive', 'noise_or_wrong_direction']

  - name: svc_investment_signals.mart_signal_quality
    description: Агрегированное качество сигналов по инструментам.
    config:
      schedule: "@hourly"
    columns:
      - name: instrument_id
        tests:
          - unique
          - not_null
      - name: ticker
        description: Торговый тикер инструмента.
        tests:
          - not_null
      - name: asset_class
        description: "Класс актива: акция, индекс и т.д."
      - name: signals_cnt
        tests:
          - not_null

  - name: svc_investment_signals.mart_signal_reliability
    description: "Надежность типов сигналов по инструментам: доля попаданий, средняя доходность по направлению сигнала и итоговая оценка."
    config:
      schedule: "@hourly"
    columns:
      - name: instrument_id
        tests:
          - not_null
      - name: ticker
        tests:
          - not_null
      - name: signal_type
        tests:
          - not_null
      - name: reliability_grade
        tests:
          - accepted_values:
              arguments:
                values: ['мало_наблюдений', 'сильный', 'рабочий', 'слабый']

  - name: svc_investment_signals.mart_trading_watchlist
    description: "Итоговый список сигналов для ручной проверки: решение, причина, качество данных и подтверждение движением цены."
    config:
      schedule: "@hourly"
    columns:
      - name: signal_id
        tests:
          - unique
          - not_null
      - name: ticker
        tests:
          - not_null
      - name: trading_decision
        tests:
          - accepted_values:
              arguments:
                values: ['кандидат', 'наблюдать', 'пропустить', 'заблокировать_из-за_данных']
      - name: decision_score
        tests:
          - not_null

  - name: svc_investment_signals.mart_market_anomalies
    description: Резкие движения цены или объема, которые могут объяснять сигналы.
    config:
      schedule: "@hourly"
    columns:
      - name: instrument_id
        tests:
          - not_null
      - name: price_ts
        tests:
          - not_null

  - name: svc_investment_signals.mart_pipeline_health
    description: Состояние загрузки и доставки сигналов по часам и инструментам.
    config:
      schedule: "@hourly"
    columns:
      - name: event_hour
        tests:
          - not_null
      - name: health_status
        tests:
          - accepted_values:
              arguments:
                values: ['healthy', 'degraded', 'broken']

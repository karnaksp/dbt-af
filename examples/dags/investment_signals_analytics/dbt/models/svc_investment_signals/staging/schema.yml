version: 2

models:
  - name: svc_investment_signals.stg.instruments
    description: Справочник инструментов, по которым рассчитываются сигналы.
    config:
      schedule: "@hourly"
    columns:
      - name: instrument_id
        tests:
          - unique
          - not_null
      - name: ticker
        tests:
          - not_null

  - name: svc_investment_signals.stg.price_ticks
    description: Нормализованные рыночные цены и объемы.
    config:
      schedule: "@hourly"
    columns:
      - name: instrument_id
        tests:
          - not_null
      - name: price_ts
        tests:
          - not_null
      - name: price
        tests:
          - not_null

  - name: svc_investment_signals.stg.signals
    description: Сигналы, рассчитанные пайплайном investment-signals.
    config:
      schedule: "@hourly"
    columns:
      - name: signal_id
        tests:
          - unique
          - not_null
      - name: instrument_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('svc_investment_signals.stg.instruments')
                field: instrument_id
      - name: score
        tests:
          - not_null

  - name: svc_investment_signals.stg.pipeline_events
    description: События загрузки, расчета и доставки сигналов.
    config:
      schedule: "@hourly"
    columns:
      - name: event_id
        tests:
          - unique
          - not_null
      - name: status
        tests:
          - accepted_values:
              arguments:
                values: ['ok', 'late', 'error']

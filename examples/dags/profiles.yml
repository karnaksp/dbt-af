default:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST') }}"
      user: "{{ env_var('POSTGRES_USER') }}"
      password: "{{ env_var('POSTGRES_PASSWORD') }}"
      port: "{{ env_var('POSTGRES_PORT') | int }}"
      dbname: "{{ env_var('POSTGRES_DB') }}"
      schema: "{{ env_var('POSTGRES_SCHEMA') }}"
      threads: "{{ env_var('POSTGRES_THREADS') | int }}"
    tests:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST') }}"
      user: "{{ env_var('POSTGRES_USER') }}"
      password: "{{ env_var('POSTGRES_PASSWORD') }}"
      port: "{{ env_var('POSTGRES_PORT') | int }}"
      dbname: "{{ env_var('POSTGRES_DB') }}"
      schema: "{{ env_var('POSTGRES_SCHEMA') }}"
      threads: 1
    large_dev:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST') }}"
      user: "{{ env_var('POSTGRES_USER') }}"
      password: "{{ env_var('POSTGRES_PASSWORD') }}"
      port: "{{ env_var('POSTGRES_PORT') | int }}"
      dbname: "{{ env_var('POSTGRES_DB') }}"
      schema: "{{ env_var('POSTGRES_SCHEMA') }}"
      threads: 1
    investment_signals:
      type: postgres
      host: "{{ env_var('INVESTMENT_SIGNALS_POSTGRES_HOST', 'host.docker.internal') }}"
      user: "{{ env_var('INVESTMENT_SIGNALS_POSTGRES_USER', 'signal_engine') }}"
      password: "{{ env_var('INVESTMENT_SIGNALS_POSTGRES_PASSWORD', 'signal_engine') }}"
      port: "{{ env_var('INVESTMENT_SIGNALS_POSTGRES_PORT', '35432') | int }}"
      dbname: "{{ env_var('INVESTMENT_SIGNALS_POSTGRES_DB', 'signal_engine') }}"
      schema: "{{ env_var('INVESTMENT_SIGNALS_POSTGRES_SCHEMA', 'investment_signals_analytics') }}"
      threads: "{{ env_var('INVESTMENT_SIGNALS_POSTGRES_THREADS', '2') | int }}"
    ingest:
      type: venv
      schema: "{{ env_var('POSTGRES_SCHEMA') }}"
      requirements:
        - pandas
        - numpy
      system_site_packages: true
      python_version: "3.10"
      pip_install_options:
        - "--no-cache-dir"
      index_urls:
        - "https://pypi.org/simple"
      inherit_env: true
